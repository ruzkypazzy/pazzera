<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Pazzera — pay-per-listen for indie artists</title>
  <meta name="description" content="Pay a fraction of a cent every time you press play. Artists get paid directly in USDC on Arc." />
  <link rel="icon" type="image/jpeg" href="/assets/favicon-32.jpg" sizes="32x32" />
  <link rel="icon" type="image/jpeg" href="/assets/favicon-192.jpg" sizes="192x192" />
  <link rel="apple-touch-icon" href="/assets/favicon-192.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <!-- Top nav -->
  <header class="topnav">
    <a href="/" class="brand" data-link>
      <img src="/assets/logo.jpg" alt="Pazzera" class="brand-logo" width="160" height="160" />
    </a>
    <nav class="navlinks">
      <a href="/" data-link>Browse</a>
      <a href="/dashboard" data-link>Dashboard</a>
      <a href="/upload" data-link>Upload</a>
    </nav>
    <div class="navright">
      <div class="listening-now-pill" id="listening-now-pill" title="Active listeners right now">
        <span class="pulse-dot"></span>
        <span id="listening-now-count">—</span>
        <span class="muted">listening</span>
      </div>
      <div id="auth-area"></div>
    </div>
  </header>

  <!-- App routes render here -->
  <main id="app"></main>

  <!-- Sticky bottom player -->
  <div id="player-bar" class="player-bar hidden">
    <div class="player-art"><img id="player-art-img" src="" alt="" /></div>
    <div class="player-meta">
      <div class="player-title" id="player-title">—</div>
      <div class="player-artist" id="player-artist">—</div>
    </div>
    <div class="player-controls">
      <button class="iconbtn" id="player-back" title="Back 10s">⟲</button>
      <button class="iconbtn playbtn" id="player-toggle" title="Play/Pause">▶</button>
      <button class="iconbtn" id="player-forward" title="Forward 10s">⟳</button>
    </div>
    <div class="player-progress">
      <span id="player-cur">0:00</span>
      <div class="progress-track" id="player-progress-track"><div class="progress-fill" id="player-progress-fill"></div></div>
      <span id="player-dur">0:00</span>
    </div>
    <div class="player-volume">
      <span>🔊</span>
      <input type="range" min="0" max="1" step="0.01" value="0.7" id="player-volume" />
    </div>
    <audio id="player-audio" preload="metadata"></audio>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
