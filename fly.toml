# Pazzera backend — Fly.io configuration

app = "pazzera"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "node -e \"console.log('pazzera backend deployed')\""

[env]
  NODE_ENV = "production"
  PORT = "3001"
  PUBLIC_BASE_URL = "https://pazzera.com"

# Persistent volume for SQLite
[[mounts]]
  source = "pazzera_data"
  destination = "/app/data"

[http_service]
  internal_port = 3001
  force_https = true
  # Keep at least 1 machine running for cert validation and to avoid cold starts
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 50
    soft_limit = 25

  [[http_service.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "1s"

  [http_service.checks]
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"